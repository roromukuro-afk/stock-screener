name: stock-screener automation

on:
  schedule:
    - cron: "40 7 * * 1-5"
    - cron: "10 8 * * 1-5"
    - cron: "40 22 * * 1-5"
    - cron: "10 23 * * 1-5"
    - cron: "0 0 * * 1-5"
    - cron: "0 14 * * 0,6"
    # ===== surge-20 専用スケジュール =====
    - cron: "30 7 * * 1-5"  # JST 16:30 平日: JPデータ拡張 (cursor chunk)
    - cron: "30 8 * * 1-5"  # JST 17:30 平日: JP候補生成+auto-save
    - cron: "0 23 * * 0-4"  # JST 08:00 平日: USデータ拡張
    - cron: "30 0 * * 1-5"  # JST 09:30 平日: surge-20 review + training save
    - cron: "0 13 * * 0,6"  # 土日 JST 22:00: 大きめ拡張 (orchestrator)
  workflow_dispatch:
    inputs:
      job:
        description: "実行するジョブ"
        required: true
        default: "status"
        type: choice
        options:
          - status
          - test-cron-secret
          - ensure-schema
          - aar-build-from-surge-events
          - compute-material-outcomes
          - collect-macro-indicators
          - run-daily-jp
          - run-daily-us
          - research-materials-daily
          - research-materials-jp
          - research-materials-us
          - run-screening-and-save-predictions-jp
          - run-screening-and-save-predictions-us
          - update-prediction-outcomes
          - review-predictions
          - save-reviews-as-training
          - run-training-builder-known-seed
          - run-training-builder-smallcap
          - run-full-daily-pipeline-jp
          - run-full-daily-pipeline-us
          - run-surge-20-daily-jp
          - run-surge-20-daily-us
          - run-one-day-surge-detection-jp
          - run-one-day-surge-detection-us
          - run-surge-20-candidate-build
          - run-surge-ranking-generation
          - run-surge-20-expand-training-jp
          - run-surge-20-expand-training-us
          - consolidate-surge-20-duplicates
          - review-surge-20-predictions
          - save-surge-20-reviews-as-training
          - cleanup-orphan-pre-features
          - run-surge-20-auto-orchestrator-jp
          - run-surge-20-auto-orchestrator-us
          - auto-save-surge-20-predictions-jp
          - auto-save-surge-20-predictions-us

jobs:
  automate:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL secret is missing"; exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is missing"; exit 1
          fi
          echo "✓ Secrets present (values hidden)"

      - name: Wake up Render (ping health + status)
        run: |
          curl -sS --max-time 60 "$BACKEND_URL/api/health" -w "\nHTTP %{http_code}\n" || true
          sleep 10
          echo "--- automation status before run ---"
          curl -sS --max-time 30 "$BACKEND_URL/api/automation/status" -w "\nHTTP %{http_code}\n" | head -c 500
          echo

      - name: Test CRON_SECRET (always)
        id: cron_test
        run: |
          code=$(curl -sS -o /tmp/cron_test.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            "$BACKEND_URL/api/automation/test-cron-secret" -d '{}')
          echo "HTTP $code"
          cat /tmp/cron_test.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::CRON_SECRET test failed (HTTP $code). Check Render Env CRON_SECRET matches GitHub Secret."
            exit 1
          fi

      - name: Ensure DB schema (schedule, safe/idempotent)
        if: github.event_name == 'schedule'
        run: |
          # 不足テーブル/カラムを非破壊で補完 (ADD COLUMN IF NOT EXISTS / CREATE TABLE)。
          # DB未接続でも degraded を返すだけなので pipeline は止めない (非致命)。
          code=$(curl -sS --max-time 120 -o /tmp/es.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            "$BACKEND_URL/api/automation/ensure-schema")
          echo "ensure-schema HTTP $code"; head -c 600 /tmp/es.json || true; echo
          if [ "$code" -ge 500 ] 2>/dev/null; then echo "::warning::ensure-schema HTTP $code (continuing)"; fi

      - name: Manual - ensure-schema
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'ensure-schema'
        run: |
          curl -sS --max-time 120 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/ensure-schema"

      - name: Manual - collect-macro-indicators
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'collect-macro-indicators'
        run: |
          curl -sS --max-time 300 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/collect-macro-indicators"

      - name: Manual - compute-material-outcomes
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'compute-material-outcomes'
        run: |
          curl -sS --max-time 600 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/compute-material-outcomes"

      - name: Manual - aar-build-from-surge-events
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'aar-build-from-surge-events'
        run: |
          # 過去の SurgeEvent から AAR 教師ケースを 300件まで取り込み (重複除外・DB-first)
          curl -sS --max-time 600 -X POST -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/aar/build-from-surge-events?market=JP&limit=300" || true
          sleep 5
          curl -sS --max-time 30 "$BACKEND_URL/api/aar/csv-progress" -w "\nHTTP %{http_code}\n" | head -c 500

      # ===== Schedule-based dispatch =====
      - name: JST 16:40 - JP daily + materials
        if: github.event_name == 'schedule' && github.event.schedule == '40 7 * * 1-5'
        run: |
          set -e
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"cron","max_symbols":300}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-daily-jp"
          sleep 30
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"cron"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/research-materials-jp"

      - name: JST 17:10 - JP screening + save predictions
        if: github.event_name == 'schedule' && github.event.schedule == '10 8 * * 1-5'
        run: |
          set -e
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"cron","max_symbols":200,"min_score":65}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-screening-and-save-predictions"

      - name: JST 07:40 - US daily + materials
        if: github.event_name == 'schedule' && github.event.schedule == '40 22 * * 1-5'
        run: |
          set -e
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"cron","max_symbols":300}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-daily-us"
          sleep 30
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"cron","max_symbols":30}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/research-materials-us"

      - name: JST 08:10 - US screening + save predictions
        if: github.event_name == 'schedule' && github.event.schedule == '10 23 * * 1-5'
        run: |
          set -e
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"cron","max_symbols":200,"min_score":65}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-screening-and-save-predictions"

      - name: JST 09:00 - outcomes + review + training save
        if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1-5'
        run: |
          set -e
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"cron"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/update-prediction-outcomes"
          sleep 20
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"cron"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/review-predictions"
          sleep 20
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"cron"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/save-reviews-as-training"

      # ===== surge-20 専用 scheduled (busy-aware / 軽量) =====
      # 共通関数: busy(409)はskip扱い、例外のみfail。--max-time必須。
      - name: JST 16:30 JP - cleanup + full_light orchestrator
        if: github.event_name == 'schedule' && github.event.schedule == '30 7 * * 1-5'
        run: |
          # 0. マクロ指標 (USD/JPY, Nikkei225, TOPIX, VIX, SOX 等) を更新
          curl -sS --max-time 300 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/collect-macro-indicators" || echo "macro skipped"
          # 1. stale掃除 (軽い)
          curl -sS --max-time 60 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"cron"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/cleanup-stale-jobs" || echo "cleanup skipped"
          # 2. full_light orchestrator (background即返し, chunk=20)
          code=$(curl -sS --max-time 120 -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"cron"}' \
            "$BACKEND_URL/api/automation/run-surge-20-auto-orchestrator")
          echo "HTTP $code"; cat /tmp/r.json || true; echo
          if [ "$code" = "409" ]; then echo "::notice::busy skip (not a failure)"; exit 0; fi
          if [ "$code" -ge 500 ] 2>/dev/null; then echo "::error::server error"; exit 1; fi

      - name: JST 17:30 JP - candidate build + auto-save (busy-aware)
        if: github.event_name == 'schedule' && github.event.schedule == '30 8 * * 1-5'
        run: |
          # busyチェック先行
          safe=$(curl -sS --max-time 30 "$BACKEND_URL/api/surge-20/light-status" | grep -o '"render_safe_to_run":[a-z]*' || echo "unknown")
          echo "render_safe: $safe"
          curl -sS --max-time 120 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"cron","max_symbols":80}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-surge-20-candidate-build" || echo "candidate-build skip/busy"
          sleep 90
          # auto-save (軽量, DBのみ)
          curl -sS --max-time 120 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"cron"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/auto-save-surge-20-predictions" || echo "auto-save skip/busy"

      - name: JST 08:00 US - cleanup + full_light orchestrator (US)
        if: github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0-4'
        run: |
          curl -sS --max-time 60 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"cron"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/cleanup-stale-jobs" || echo "cleanup skipped"
          code=$(curl -sS --max-time 120 -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"cron"}' \
            "$BACKEND_URL/api/automation/run-surge-20-auto-orchestrator")
          echo "HTTP $code"; cat /tmp/r.json || true; echo
          if [ "$code" = "409" ]; then echo "::notice::busy skip"; exit 0; fi

      - name: JST 09:30 surge-20 review + training save + material outcomes (軽量)
        if: github.event_name == 'schedule' && github.event.schedule == '30 0 * * 1-5'
        run: |
          curl -sS --max-time 120 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"cron"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/review-surge-20-predictions" || echo "review skip/busy"
          sleep 30
          curl -sS --max-time 120 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"cron"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/save-surge-20-reviews-as-training" || echo "save skip/busy"
          sleep 30
          # 直近60日の MaterialEvent → 株価結果 (T+1/3/5/10/20, max_gain, hit_20) を再計算。
          # historical_ohlcv キャッシュから読むだけなので軽量。
          curl -sS --max-time 300 -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/compute-material-outcomes" || echo "outcomes skip"

      - name: Weekend JST 23:00 - training builder
        if: github.event_name == 'schedule' && github.event.schedule == '0 14 * * 0,6'
        run: |
          set -e
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"cron"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-training-builder-known-seed"
          sleep 60
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"cron"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-training-builder-smallcap"
          # 新たに検出された SurgeEvent を AAR 教師ケースへ取り込む (DB-first・非同期)
          sleep 60
          curl -sS --max-time 600 -X POST -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/aar/build-from-surge-events?market=JP&limit=300" || true
          sleep 5
          curl -sS --max-time 600 -X POST -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/aar/build-from-surge-events?market=US&limit=300" || true

      # ===== Manual dispatch =====
      - name: Manual - status
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'status'
        run: |
          curl -sS "$BACKEND_URL/api/automation/status" -w "\nHTTP %{http_code}\n"

      - name: Manual - test-cron-secret (already done above)
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'test-cron-secret'
        run: |
          echo "test-cron-secret はワークフロー冒頭で実行済み (HTTP 200ならOK)"

      - name: Manual - run-daily-jp
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-daily-jp'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"manual","max_symbols":300}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-daily-jp"

      - name: Manual - run-daily-us
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-daily-us'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"manual","max_symbols":300}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-daily-us"

      - name: Manual - research-materials-daily
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'research-materials-daily'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"manual"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/research-materials-daily"

      - name: Manual - research-materials-jp
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'research-materials-jp'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"manual"}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/research-materials-jp"

      - name: Manual - research-materials-us
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'research-materials-us'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"trigger_type":"manual","max_symbols":30}' -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/research-materials-us"

      - name: Manual - screening jp
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-screening-and-save-predictions-jp'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"manual","max_symbols":200}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-screening-and-save-predictions"

      - name: Manual - screening us
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-screening-and-save-predictions-us'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"manual","max_symbols":200}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-screening-and-save-predictions"

      - name: Manual - update-prediction-outcomes
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'update-prediction-outcomes'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/update-prediction-outcomes"

      - name: Manual - review-predictions
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'review-predictions'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/review-predictions"

      - name: Manual - save-reviews-as-training
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'save-reviews-as-training'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/save-reviews-as-training"

      - name: Manual - run-training-builder-known-seed
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-training-builder-known-seed'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-training-builder-known-seed"

      - name: Manual - run-training-builder-smallcap
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-training-builder-smallcap'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" -d '{"trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-training-builder-smallcap"

      - name: Manual - run-full-daily-pipeline-jp
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-full-daily-pipeline-jp'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-full-daily-pipeline"

      - name: Manual - run-full-daily-pipeline-us
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-full-daily-pipeline-us'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"manual"}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-full-daily-pipeline"

      - name: Manual - surge-20 daily jp
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-surge-20-daily-jp'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"JP","trigger_type":"manual","max_symbols":100}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-surge-20-daily"

      - name: Manual - surge-20 daily us
        if: github.event_name == 'workflow_dispatch' && inputs.job == 'run-surge-20-daily-us'
        run: |
          curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d '{"market":"US","trigger_type":"manual","max_symbols":100}' \
            -w "\nHTTP %{http_code}\n" \
            "$BACKEND_URL/api/automation/run-surge-20-daily"

      - name: Manual - one day surge detection jp
